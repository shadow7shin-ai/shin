<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>FISHING LIFE 2025</title>
    
    <!-- Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+KR:wght@400;700;900&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', 'Noto Sans KR', sans-serif;
            background-color: #000;
            margin: 0; padding: 0;
            overflow: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        #root { 
            height: 100dvh; width: 100%; 
            display: flex; justify-content: center; align-items: center;
        }
        .app-container {
            width: 100%; max-width: 430px; 
            height: 100dvh; background-color: #fff;
            position: relative; display: flex; flex-direction: column;
            overflow: hidden; box-shadow: 0 0 50px rgba(0,0,0,0.8);
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .holiday-text { color: #f87171 !important; font-weight: 900 !important; }
        .saturday-text { color: #60a5fa !important; }

        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
        .animate-slide-up { animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        
        /* 캘린더 날짜 칸 높이를 조절하여 한 화면에 잘 나오도록 변경 */
        .day-cell { min-height: 60px; height: 10.5vh; max-height: 85px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDK Setup -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, getDocs, deleteDoc, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const appId = typeof __app_id !== 'undefined' ? __app_id : 'fishing-life-2025';
        const firebaseConfig = typeof __firebase_config !== 'undefined' && __firebase_config ? JSON.parse(__firebase_config) : {};

        window.FBASE_LIB = { initializeApp, getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged, getFirestore, doc, setDoc, getDoc, collection, onSnapshot, query, where, getDocs, deleteDoc, updateDoc };
        window.FBASE_CONFIG = { id: appId, config: firebaseConfig };
        window.dispatchEvent(new CustomEvent('fbase-ready-init'));
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, Fragment } = React;

        const Icon = ({ name, className = "w-4 h-4", strokeWidth = 2.5 }) => {
            const icons = {
                Calendar: <path d="M8 2v4M16 2v4M3 10h18M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>,
                Trophy: <path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6M18 9h1.5a2.5 2.5 0 0 0 0-5H18M4 22h16M10 14.66V17c0 .55-.47.98-.97 1.21C7.85 18.75 7 20.24 7 22M14 14.66V17c0 .55.47.98.97 1.21C16.15 18.75 17 20.24 17 22M9 2h6v7a3 3 0 0 1-6 0V2z"/>,
                Users: <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2M9 7a4 4 0 1 0 0-8 4 4 0 0 0 0 8zM22 21v-2a4 4 0 0 0-3-3.87M16 3.13a4 4 0 0 1 0 7.75"/>,
                Refresh: <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8M21 3v5h-5M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16M3 21v-5h5"/>,
                Plus: <path d="M12 5v14M5 12h14"/>,
                Info: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/></Fragment>,
                Trash: <path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M10 11v6M14 11v6"/>,
                Alert: <Fragment><circle cx="12" cy="12" r="10"/><path d="M12 8v4M12 16h.01"/></Fragment>,
                Share: <path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8M16 6l-4-4-4 4M12 2v13"/>,
                Ship: <path d="M2 21c.6.5 1.2 1 2.5 1s2.5-.5 3.5-1c1-.5 2.1-1 3.5-1s2.5.5 3.5 1c1 .5 2.1 1 3.5 1s2.5-.5 3.5-1M19.38 20.51l1.54-5.38A2 2 0 0 0 18.99 12H13V3l-9 6v3h3.5a2 2 0 0 0 1.93 1.51l.46 2.49"/>,
                Link: <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>,
                Check: <path d="M20 6 9 17l-5-5"/>
            };
            return (
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth={strokeWidth} strokeLinecap="round" strokeLinejoin="round" className={className}>
                    {icons[name]}
                </svg>
            );
        };

        const HOLIDAYS = {
            "2025-1-1": "신정", "2025-1-28": "설날", "2025-1-29": "설날", "2025-1-30": "설날",
            "2025-3-1": "삼일절", "2025-3-3": "대체휴무", "2025-5-5": "어린이날", "2025-5-6": "부처님오신날",
            "2025-6-6": "현충일", "2025-8-15": "광복절", "2025-10-3": "개천절", "2025-10-5": "추석",
            "2025-10-6": "추석", "2025-10-7": "추석", "2025-10-8": "대체휴무", "2025-10-9": "한글날", "2025-12-25": "성탄절"
        };

        const App = () => {
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [activeTab, setActiveTab] = useState('calendar');
            const [members, setMembers] = useState([]);
            const [records, setRecords] = useState({});
            const [pbRecords, setPbRecords] = useState({});
            const [currentDate, setCurrentDate] = useState(new Date());
            const [selectedDayKey, setSelectedDayKey] = useState(null);
            const [modalType, setModalType] = useState(null);
            const [importText, setImportText] = useState('');
            const [alertConfig, setAlertConfig] = useState({ show: false, title: '', message: '', onConfirm: null });

            const [formData, setFormData] = useState({
                names: [], status: '출조', place: '선상', species: '',
                ship: '', fee: '', account: '', link: '', paidMap: {}
            });

            // 랭킹 가공 연산
            const rankingData = useMemo(() => {
                const groups = {};
                members.forEach(m => {
                    (pbRecords[m]?.list || []).forEach(p => {
                        if (!groups[p.species]) groups[p.species] = [];
                        groups[p.species].push({ name: m, ...p });
                    });
                });
                const userMedals = {};
                const specRanks = {};
                Object.keys(groups).forEach(s => {
                    const sorted = [...groups[s]].sort((a, b) => (Number(b.count) - Number(a.count)) || (Number(b.length) - Number(a.length)));
                    specRanks[s] = sorted.map((x, i) => ({ ...x, rank: i + 1 }));
                    sorted.forEach((x, i) => {
                        if (!userMedals[x.name]) userMedals[x.name] = { g: 0, s: 0, b: 0 };
                        if (i === 0) userMedals[x.name].g++;
                        else if (i === 1) userMedals[x.name].s++;
                        else if (i === 2) userMedals[x.name].b++;
                    });
                });
                return { userMedals, specRanks };
            }, [members, pbRecords]);

            const sortedMembers = useMemo(() => {
                return [...members].sort((a, b) => {
                    const am = rankingData.userMedals[a] || { g: 0, s: 0, b: 0 };
                    const bm = rankingData.userMedals[b] || { g: 0, s: 0, b: 0 };
                    return (bm.g - am.g) || (bm.s - am.s) || (bm.b - am.b);
                });
            }, [members, rankingData]);

            const calendarCells = useMemo(() => {
                const f = new Date(currentDate.getFullYear(), currentDate.getMonth(), 1).getDay();
                const l = new Date(currentDate.getFullYear(), currentDate.getMonth() + 1, 0).getDate();
                const c = [];
                for (let i = 0; i < f; i++) c.push({ type: 'empty' });
                for (let d = 1; d <= l; d++) {
                    const k = `${currentDate.getFullYear()}-${currentDate.getMonth() + 1}-${d}`;
                    c.push({ type: 'day', day: d, key: k, data: records[k] || null });
                }
                return c;
            }, [currentDate, records]);

            // 로컬 스토리지(HTML) 및 Firebase 초기화
            useEffect(() => {
                const init = async () => {
                    if (!window.FBASE_LIB || !window.FBASE_CONFIG) return;
                    const { FBASE_LIB, FBASE_CONFIG } = window;
                    
                    const defaultMembers = ['신동일', '한상규', '김헌준', '최성민', '이광윤', '김진원', '김혜진'];

                    // HTML 환경에서 DB가 없을 경우 로컬 스토리지 연동
                    if (!FBASE_CONFIG.config.apiKey) {
                        let localMembers = JSON.parse(localStorage.getItem('FL_MEMBERS'));
                        // 로컬 스토리지에 멤버가 없으면 기본 멤버로 복구 및 저장
                        if (!localMembers || localMembers.length === 0) {
                            localMembers = defaultMembers;
                            localStorage.setItem('FL_MEMBERS', JSON.stringify(localMembers));
                        }
                        
                        const localRecords = JSON.parse(localStorage.getItem('FL_SCHEDULES')) || {};
                        const localPb = JSON.parse(localStorage.getItem('FL_RANKINGS')) || {};
                        
                        setMembers(localMembers);
                        setRecords(localRecords);
                        setPbRecords(localPb);
                        setIsAuthReady(true);
                        return;
                    }

                    const fbApp = FBASE_LIB.initializeApp(FBASE_CONFIG.config);
                    const auth = FBASE_LIB.getAuth(fbApp);
                    const db = FBASE_LIB.getFirestore(fbApp);

                    FBASE_LIB.onAuthStateChanged(auth, async (user) => {
                        if (user) {
                            const baseCol = `/artifacts/${FBASE_CONFIG.id}/public/data`;
                            
                            FBASE_LIB.onSnapshot(FBASE_LIB.doc(db, `${baseCol}/config`, 'members'), (s) => {
                                const data = s.data();
                                // DB에 멤버가 없으면 기본 멤버로 복구
                                if (s.exists() && data && data.list && data.list.length > 0) {
                                    setMembers(data.list);
                                } else {
                                    FBASE_LIB.setDoc(FBASE_LIB.doc(db, `${baseCol}/config`, 'members'), { list: defaultMembers });
                                    setMembers(defaultMembers);
                                }
                            });
                            
                            FBASE_LIB.onSnapshot(FBASE_LIB.collection(db, `${baseCol}/schedules`), (s) => {
                                const r = {}; s.forEach(d => r[d.id] = d.data());
                                setRecords(r);
                            });
                            FBASE_LIB.onSnapshot(FBASE_LIB.collection(db, `${baseCol}/rankings`), (s) => {
                                const p = {}; s.forEach(d => p[d.id] = d.data());
                                setPbRecords(p);
                            });
                            setIsAuthReady(true);
                        } else {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await FBASE_LIB.signInWithCustomToken(auth, __initial_auth_token);
                            else await FBASE_LIB.signInAnonymously(auth);
                        }
                    });
                };
                if (window.FBASE_LIB) init();
                else window.addEventListener('fbase-ready-init', init);
            }, []);

            const getTideValue = (dateKey) => {
                if (!dateKey) return "1";
                const d = parseInt(dateKey.split('-')[2]);
                return (d % 15 || 15);
            };

            const closeModals = () => { setModalType(null); setAlertConfig({show:false}); };
            const showAlert = (t, m, c = null) => setAlertConfig({ show: true, title: t, message: m, onConfirm: c });

            const saveSchedule = async () => {
                if (!selectedDayKey) return;
                const { FBASE_LIB, FBASE_CONFIG } = window;
                const tideVal = getTideValue(selectedDayKey);
                
                const dayData = {};
                formData.names.forEach(n => { 
                    dayData[n] = { 
                        names: formData.names, status: formData.status, place: formData.place, 
                        species: formData.species, ship: formData.ship, fee: formData.fee, 
                        account: formData.account, link: formData.link, paid: formData.paidMap[n] || false,
                        tide: tideVal
                    }; 
                });

                // HTML 로컬 스토리지에 영구 저장
                if (!FBASE_CONFIG.config.apiKey) {
                    setRecords(prev => {
                        const next = {...prev, [selectedDayKey]: dayData};
                        localStorage.setItem('FL_SCHEDULES', JSON.stringify(next));
                        return next;
                    });
                    return closeModals();
                }

                const db = FBASE_LIB.getFirestore();
                await FBASE_LIB.setDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/schedules`, selectedDayKey), dayData);
                closeModals();
            };

            const deleteSchedule = () => {
                showAlert("삭제", "해당 일정을 지울까요?", async () => {
                    const { FBASE_LIB, FBASE_CONFIG } = window;
                    // HTML 로컬 환경 데이터 삭제 반영
                    if (!FBASE_CONFIG.config.apiKey) {
                        setRecords(prev => { 
                            const next = {...prev}; 
                            delete next[selectedDayKey]; 
                            localStorage.setItem('FL_SCHEDULES', JSON.stringify(next));
                            return next; 
                        });
                        return closeModals();
                    }
                    const db = FBASE_LIB.getFirestore();
                    await FBASE_LIB.deleteDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/schedules`, selectedDayKey));
                    closeModals();
                });
            };

            const triggerResetAll = () => {
                showAlert("초기화", "데이터를 모두 지울까요?", async () => {
                    const { FBASE_LIB, FBASE_CONFIG } = window;
                    // HTML 로컬 환경 초기화 반영
                    if (!FBASE_CONFIG.config.apiKey) {
                        setRecords({});
                        localStorage.removeItem('FL_SCHEDULES');
                        return closeModals();
                    }
                    const db = FBASE_LIB.getFirestore();
                    const snap = await FBASE_LIB.getDocs(FBASE_LIB.collection(db, `/artifacts/${FBASE_CONFIG.id}/public/data/schedules`));
                    snap.forEach(async (d) => {
                        await FBASE_LIB.deleteDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/schedules`, d.id));
                    });
                    closeModals();
                });
            };

            const savePB = async (name) => {
                const { FBASE_LIB, FBASE_CONFIG } = window;
                const s = document.getElementById(`pb-s-${name}`).value;
                const c = Number(document.getElementById(`pb-c-${name}`).value) || 0;
                const l = Number(document.getElementById(`pb-l-${name}`).value) || 0;
                
                if (!s) return showAlert("경고", "어종을 선택해주세요.");
                
                const list = pbRecords[name]?.list || [];
                const updated = [...list.filter(x => x.species !== s), { species: s, count: c, length: l }];
                
                // HTML 로컬 환경 랭킹 저장 반영
                if (!FBASE_CONFIG.config.apiKey) {
                    setPbRecords(prev => {
                        const next = {...prev, [name]: { list: updated }};
                        localStorage.setItem('FL_RANKINGS', JSON.stringify(next));
                        return next;
                    });
                    return showAlert("성공", "기록이 저장되었습니다.");
                }

                const db = FBASE_LIB.getFirestore();
                await FBASE_LIB.setDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/rankings`, name), { list: updated });
                showAlert("성공", "기록이 저장되었습니다.");
            };

            const deletePB = (name, spec) => {
                showAlert("기록 삭제", `${spec} 기록을 지울까요?`, async () => {
                    const { FBASE_LIB, FBASE_CONFIG } = window;
                    const updated = (pbRecords[name]?.list || []).filter(p => p.species !== spec);
                    // HTML 로컬 환경 랭킹 삭제 반영
                    if (!FBASE_CONFIG.config.apiKey) {
                        setPbRecords(prev => {
                            const next = {...prev, [name]: { list: updated }};
                            localStorage.setItem('FL_RANKINGS', JSON.stringify(next));
                            return next;
                        });
                        return;
                    }
                    const db = FBASE_LIB.getFirestore();
                    await FBASE_LIB.setDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/rankings`, name), { list: updated });
                });
            };

            const processImport = async () => {
                if (!importText.trim()) return;
                const { FBASE_LIB, FBASE_CONFIG } = window;
                const isLocal = !FBASE_CONFIG.config.apiKey;
                const db = isLocal ? null : FBASE_LIB.getFirestore();
                
                try {
                    const lines = importText.split('\n');
                    let dK = "", sN = "", f = "", a = "", names = [], spec = "", lk = "", pl = "선상", st = "출조";
                    let pM = {};

                    for (let line of lines) {
                        const l = line.trim();
                        if(l.includes("날짜:")) dK = l.split("날짜:")[1].trim();
                        if(l.includes("배이름:")) sN = l.split("배이름:")[1].trim();
                        if(l.includes("선비:")) f = l.split("선비:")[1].trim();
                        if(l.includes("계좌:")) a = l.split("계좌:")[1].trim();
                        if(l.includes("어종:")) spec = l.split("어종:")[1].trim();
                        if(l.includes("타입:")) pl = l.split("타입:")[1].trim();
                        if(l.includes("상태:")) st = l.split("상태:")[1].trim();
                        if(l.includes("링크:")) lk = l.split("링크:")[1].trim();
                        if(l.includes("명단:")) {
                            l.split("명단:")[1].split(',').forEach(nStr => {
                                const clean = nStr.trim(); 
                                if(!clean) return;
                                const isP = clean.includes("(완료)");
                                const nOnly = clean.replace("(완료)","").replace("(미입금)","").trim();
                                names.push(nOnly); 
                                pM[nOnly] = isP;
                            });
                        }
                        if(l.startsWith("- ") && l.includes(":")) {
                            const content = l.substring(2);
                            const nPart = content.split(":")[0].trim();
                            const recPart = content.split(":")[1]?.trim();
                            if(recPart && recPart.includes("(")) {
                               const items = recPart.split(",");
                               const newList = [];
                               items.forEach(item => {
                                  const match = item.match(/(.+)\((.+)\)/);
                                  if(match) {
                                      const sn = match[1].trim(); 
                                      const detail = match[2].trim();
                                      let vl=0, vc=0;
                                      if(detail.includes("cm")) vl = parseFloat(detail) || 0;
                                      else if(detail.includes("마리")) vc = parseInt(detail) || 0;
                                      newList.push({ species: sn, length: vl, count: vc });
                                  }
                               });
                               if(newList.length > 0) {
                                   // HTML 환경 가져오기 로컬 저장 반영
                                   if (isLocal) {
                                       setPbRecords(prev => {
                                           const next = {...prev, [nPart]: {list: newList}};
                                           localStorage.setItem('FL_RANKINGS', JSON.stringify(next));
                                           return next;
                                       });
                                   } else {
                                       await FBASE_LIB.setDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/rankings`, nPart), { list: newList });
                                   }
                               }
                            }
                        }
                    }
                    if(!dK || names.length === 0) throw new Error();
                    const dayData = {};
                    names.forEach(n => { dayData[n] = { names, status: st, place: pl, species: spec, ship: sN, fee: f, account: a, link: lk, paid: pM[n]||false }; });
                    
                    // HTML 환경 스케줄 로컬 저장 반영
                    if (isLocal) {
                        setRecords(prev => {
                            const next = {...prev, [dK]: dayData};
                            localStorage.setItem('FL_SCHEDULES', JSON.stringify(next));
                            return next;
                        });
                    } else {
                        await FBASE_LIB.setDoc(FBASE_LIB.doc(db, `/artifacts/${FBASE_CONFIG.id}/public/data/schedules`, dK), dayData);
                    }
                    setImportText(''); closeModals();
                    showAlert("성공", "데이터가 정상적으로 복원되었습니다.");
                } catch(e) { showAlert("실패", "파싱 오류 발생"); }
            };

            const exportText = () => {
                const d = records[selectedDayKey];
                if (!d) return;
                const ns = Object.keys(d);
                const f = d[ns[0]];
                const nList = ns.map(n => `${n}${d[n].paid ? '(완료)' : '(미입금)'}`).join(', ');
                let pbT = "\n\n🏆 실시간 개인 최고 기록\n━━━━━━━━━━━━\n";
                members.forEach(m => {
                    const l = pbRecords[m]?.list || [];
                    if(l.length > 0) {
                        const its = l.map(x => `${x.species}(${x.count>0?x.count+'마리':x.length>0?x.length+'cm':x.weight+'kg'})`).join(', ');
                        pbT += `- ${m}: ${its}\n`;
                    }
                });
                const text = `[FISHING LIFE 2025]\n━━━━━━━━━━━━\n📅 날짜: ${selectedDayKey}\n🚢 배이름: ${f.ship || '-'}\n💰 선비: ${f.fee || '0'}원\n🏦 계좌: ${f.account || '미등록'}\n👥 명단: ${nList}\n🎯 어종: ${f.species || '-'}\n⛺ 타입: ${f.place || '선상'}\n🚩 상태: ${f.status}\n🔗 링크: ${f.link || '-'}${pbT}`;
                const dummy = document.createElement("textarea"); document.body.appendChild(dummy); dummy.value = text; dummy.select(); document.execCommand("copy"); document.body.removeChild(dummy);
                showAlert("복사 완료", "카톡에 정보를 공유하세요.");
            };

            if (!isAuthReady) return <div className="h-full w-full flex flex-col items-center justify-center bg-[#0a0c10] text-cyan-500 font-black italic animate-pulse text-xl">FISHING LIFE READY...</div>;

            return (
                <div className="app-container text-black">
                    <div className="absolute inset-0 z-0 h-[45%] overflow-hidden pointer-events-none opacity-40">
                        <img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5?auto=format&fit=crop&w=1200&q=80" className="w-full h-full object-cover" alt="bg" />
                        <div className="absolute inset-0 bg-gradient-to-b from-transparent to-white"></div>
                    </div>

                    <header className="relative z-10 px-5 pt-10 pb-4 flex flex-col gap-4 border-b-4 border-cyan-600 bg-white/60 backdrop-blur-md">
                        <div className="flex justify-between items-center text-black font-black">
                            <h1 className="text-2xl font-black italic tracking-tighter text-cyan-900 leading-none">FISHING LIFE</h1>
                            <button onClick={() => setModalType('import')} className="bg-black text-white px-4 py-1.5 rounded-xl text-[10px] font-black active:scale-95 shadow-lg">가져오기</button>
                        </div>
                        <div className="flex gap-1 font-bold text-black">
                            <select value={currentDate.getFullYear()} onChange={e=>setCurrentDate(new Date(e.target.value, currentDate.getMonth(), 1))} className="bg-white border border-slate-200 rounded-lg px-2 py-1 text-sm font-black outline-none"><option value="2025">2025년</option><option value="2026">2026년</option></select>
                            <select value={currentDate.getMonth()} onChange={e=>setCurrentDate(new Date(currentDate.getFullYear(), e.target.value, 1))} className="bg-white border border-slate-200 rounded-lg px-2 py-1 text-sm font-black outline-none">{[...Array(12)].map((_,i)=><option key={i} value={i}>{i+1}월</option>)}</select>
                        </div>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar relative z-10 px-2 pb-24 text-left leading-none text-black">
                        <div className="animate-in fade-in duration-500">
                            <div className="grid grid-cols-7 py-2 font-black text-[10px] text-slate-300 text-center tracking-widest uppercase">
                                <div className="text-rose-500">Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div className="text-blue-500">Sat</div>
                            </div>
                            {activeTab === 'calendar' ? (
                                <div className="grid grid-cols-7 gap-1 px-1">
                                    {calendarCells.map((cell, idx) => {
                                        const isSun = idx % 7 === 0;
                                        const isSat = idx % 7 === 6;
                                        const hol = HOLIDAYS[cell.key];
                                        const tide = getTideValue(cell.key);
                                        return (
                                            <div key={idx} className="day-cell relative text-black leading-none">
                                                {cell.type === 'day' && (
                                                    <button onClick={() => { setSelectedDayKey(cell.key); setModalType('choice'); }} className={`w-full h-full rounded-xl border flex flex-col p-1.5 transition-all active:scale-95 overflow-hidden shadow-sm ${cell.data ? 'bg-white border-rose-500 ring-2 ring-rose-50 shadow-md' : 'bg-white/60 border-slate-50'}`}>
                                                        <div className="flex justify-between items-start mb-1 text-black font-black w-full">
                                                            <span className={`text-[12px] font-black ${isSun || hol ? 'text-rose-500' : isSat ? 'text-blue-500' : 'text-slate-900'}`}>{cell.day}</span>
                                                            {hol && <span className="text-[6px] font-black text-rose-400 truncate max-w-[25px]">{hol}</span>}
                                                        </div>
                                                        {cell.data ? (
                                                            <div className="flex-1 flex flex-col gap-0.5 text-left w-full overflow-hidden text-black leading-tight">
                                                                <div className="text-[12px] font-black text-slate-950 truncate italic mb-0.5">{Object.keys(cell.data)[0]}</div>
                                                                <div className="text-[8px] font-bold text-emerald-600 leading-none">외 {Object.keys(cell.data).length-1}명</div>
                                                                <div className={`text-[11px] font-black leading-none py-1 ${cell.data[Object.keys(cell.data)[0]].status === '휴무' ? 'text-slate-300' : 'text-rose-600 uppercase font-black italic'}`}>{cell.data[Object.keys(cell.data)[0]].status === '휴무' ? '휴무' : '출조!!'}</div>
                                                                <div className="mt-auto h-4"></div>
                                                                <div className="w-full mt-0.5 border-t border-slate-50 pt-1 text-center">
                                                                    <div className="text-[11px] font-black text-slate-950 text-center leading-none italic font-black"><b>{tide}물</b></div>
                                                                </div>
                                                            </div>
                                                        ) : (
                                                            <div className="mt-auto flex flex-col items-center opacity-40 text-center w-full">
                                                                <span className="text-[11px] font-black text-slate-950 italic text-center italic font-black"><b>{tide}물</b></span>
                                                                <div className="w-full h-0.5 bg-slate-100 rounded-full mt-1"></div>
                                                            </div>
                                                        )}
                                                    </button>
                                                )}
                                            </div>
                                        );
                                    })}
                                </div>
                            ) : (
                                <div className="space-y-6 py-4 px-2 text-left text-black">
                                    <h3 className="text-xl font-black italic text-cyan-900 border-b-2 border-black pb-2 px-1 uppercase tracking-tighter">🏆 리더 보드</h3>
                                    {sortedMembers.map(m => {
                                        const med = rankingData.userMedals[m] || { g: 0, s: 0, b: 0 };
                                        const list = pbRecords[m]?.list || [];
                                        return (
                                            <div key={m} className="bg-white rounded-[2rem] border-2 border-black p-5 shadow-lg flex flex-col gap-4 text-black text-left">
                                                <div className="flex justify-between items-center border-b border-slate-50 pb-3 text-black">
                                                    <div className="text-left text-black leading-none"><div className="text-xl font-black italic mb-1 leading-none">{m}</div><div className="flex gap-2 text-[11px] font-black mt-1 text-slate-400 uppercase text-black text-left"><span>🥇{med.g}</span><span>🥈{med.s}</span><span>🥉{med.b}</span></div></div>
                                                    <div className="bg-cyan-50 px-3 py-1 rounded-full border border-black text-[10px] font-black italic text-cyan-700 uppercase">MASTER</div>
                                                </div>
                                                <div className="bg-slate-50 rounded-2xl p-4 border border-slate-100 shadow-inner text-black">
                                                    <div className="flex gap-1 mb-4 bg-white p-1 rounded-xl border border-slate-200">
                                                        <select id={`pb-s-${m}`} className="flex-1 text-[10px] font-black outline-none bg-transparent px-2 italic text-black text-left"><option value="">어종 선택</option>{['우럭','광어','참돔','쭈꾸미','갑오징어','문어','한치','백조기','기타'].map(x=><option key={x} value={x}>{x}</option>)}</select>
                                                        <input id={`pb-c-${m}`} type="number" placeholder="마리" className="w-10 text-[10px] font-black text-center outline-none text-black" />
                                                        <input id={`pb-l-${m}`} type="number" placeholder="cm" className="w-10 text-[10px] font-black text-center outline-none text-black" />
                                                        <button onClick={()=>savePB(m)} className="bg-black text-white px-3 py-1.5 rounded-lg text-[10px] font-black active:scale-95 shadow-md text-center">저장</button>
                                                    </div>
                                                    <div className="grid grid-cols-2 gap-2 text-black text-left">
                                                        {list.map((r, i) => (
                                                            <div key={i} onClick={()=>deletePB(m, r.species)} className="bg-white border border-slate-200 rounded-xl p-3 text-left relative group shadow-sm text-black">
                                                                <div className="flex justify-between text-[11px] font-black italic text-slate-800 text-black text-left"><span>{r.species}</span><span className="text-blue-500 font-black text-center">{(rankingData.specRanks[r.species]||[]).find(x=>x.name===m)?.rank}위</span></div>
                                                                <div className="text-[10px] font-black text-cyan-700 leading-none">{r.count > 0 ? r.count+'마리' : r.length+'cm'}</div>
                                                                <div className="absolute inset-0 bg-rose-500/10 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity text-black text-center"><Icon name="Trash" className="w-4 h-4 text-rose-500" /></div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    </main>

                    <footer className="fixed bottom-0 w-full max-w-[430px] z-50 bg-white border-t-2 border-slate-100 flex justify-around items-center py-4 pb-10 shadow-2xl text-black">
                        <button onClick={()=>setActiveTab('calendar')} className={`flex flex-col items-center gap-1 ${activeTab==='calendar'?'text-cyan-600 scale-110 font-black':'text-slate-300'}`}><Icon name="Calendar" className="w-6 h-6"/><span className="text-[9px]">달력</span></button>
                        <button onClick={()=>setActiveTab('stats')} className={`flex flex-col items-center gap-1 ${activeTab==='stats'?'text-cyan-600 scale-110 font-black':'text-slate-300'}`}><Icon name="Trophy" className="w-6 h-6"/><span className="text-[9px]">현황</span></button>
                        <button onClick={()=>setModalType('name')} className="flex flex-col items-center gap-1 text-slate-300 font-bold"><Icon name="Users" className="w-6 h-6"/><span className="text-[9px]">크루</span></button>
                        <button onClick={triggerResetAll} className="flex flex-col items-center gap-1 text-rose-300 font-bold text-center leading-none text-black"><Icon name="Refresh" className="w-6 h-6 text-rose-400"/><span className="text-[9px] text-rose-400 font-black tracking-tighter">리셋</span></button>
                    </footer>

                    {modalType && (
                        <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-end justify-center p-6 animate-in fade-in duration-300 text-black text-left">
                            <div className="w-full max-w-[400px] bg-white rounded-t-[40px] shadow-2xl border-t-8 border-black overflow-hidden animate-slide-up pb-10 text-black text-left">
                                {modalType === 'choice' && (
                                    <div className="p-12 space-y-5 text-center text-black">
                                        <h3 className="text-xl font-black mb-6 italic underline decoration-cyan-100 decoration-8 underline-offset-2 leading-none text-black text-center">{selectedDayKey}</h3>
                                        <button onClick={()=>{setFormData({names:[],status:'출조',place:'선상',species:'',ship:'',fee:'',account:'',link:'',paidMap:{}}); setModalType('setup');}} className="w-full py-6 bg-black text-white rounded-2xl font-black text-xl flex items-center justify-center gap-4 active:scale-95 shadow-xl text-black text-center"><Icon name="Plus" className="w-6 h-6 text-emerald-400" /> 신규 설정</button>
                                        <button onClick={()=>{const d=records[selectedDayKey]; if(d){const ns=Object.keys(d); setFormData({names:ns,...d[ns[0]],paidMap:Object.fromEntries(ns.map(n=>[n,d[n].paid]))}); setModalType('setup');} }} className="w-full py-6 bg-amber-50 border-2 border-amber-400 text-amber-700 rounded-2xl font-black text-xl shadow-lg active:scale-95 flex items-center justify-center gap-4 text-left leading-none text-black text-left"><Icon name="Refresh" className="w-6 h-6 text-black text-left" /> 설정 수정</button>
                                        <button onClick={()=>setModalType('info')} className="w-full py-6 bg-white border-2 border-black rounded-2xl font-black text-xl shadow-xl active:scale-95 flex items-center justify-center gap-4 text-cyan-600 text-center text-black text-center"><Icon name="Info" className="w-6 h-6 text-black text-center" /> 정보 확인</button>
                                        <button onClick={exportText} className="w-full py-4 bg-emerald-50 text-emerald-700 rounded-2xl font-black flex items-center justify-center gap-2 active:scale-95 text-center text-black text-center"><Icon name="Share" className="w-4 h-4 text-center text-black text-center" /> 내보내기</button>
                                        <div className="flex flex-col gap-2 mt-6 text-center text-black text-center"><button onClick={deleteSchedule} className="py-2 text-rose-500 font-black text-[10px] underline text-black text-center">삭제</button><button onClick={closeModals} className="py-4 text-slate-400 font-bold text-center uppercase text-black text-center">닫기</button></div>
                                    </div>
                                )}

                                {modalType === 'info' && (
                                    <div className="p-8 max-h-[85vh] overflow-y-auto no-scrollbar text-black text-left text-black text-left">
                                        <h3 className="text-2xl font-black mb-8 text-center italic underline decoration-cyan-100 decoration-8 underline-offset-2 uppercase text-black text-center">Briefing</h3>
                                        {records[selectedDayKey] ? (
                                            <div className="space-y-6 text-left text-black text-left">
                                                <div className="bg-emerald-50 border-4 border-black p-6 rounded-[2rem] space-y-4 shadow-xl text-black text-left">
                                                    <div className="flex items-center gap-3 text-emerald-950 font-black text-xl italic text-left leading-none mb-2 text-black text-left text-black text-left"><Icon name="Ship" className="w-6 h-6 text-emerald-600 text-black text-left text-black text-left" /> {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].ship || '선박명 미등록'}</div>
                                                    <div className="grid grid-cols-2 gap-2 text-[10px] font-black text-emerald-800 text-left text-black text-left text-black text-left">
                                                        <div className="bg-white/60 p-2 rounded-xl flex flex-col shadow-inner text-black text-left text-black text-left"><span>🎯 어종: {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].species || '미지정'}</span></div>
                                                        <div className="bg-white/60 p-2 rounded-xl flex flex-col shadow-inner text-black text-left text-black text-left"><span>⛺ 타입: {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].place || '선상'}</span></div>
                                                        <div className="bg-white/60 p-2 rounded-xl flex flex-col shadow-inner text-black text-left text-black text-left"><span>💰 선비: {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].fee || '0'}원</span></div>
                                                        <div className="bg-white/60 p-2 rounded-xl flex flex-col shadow-inner text-black font-black text-left text-left text-black text-left text-black text-left"><span>🌊 물때: <b>{getTideValue(selectedDayKey)}물</b></span></div>
                                                    </div>
                                                    <div className="bg-white/60 p-3 rounded-xl text-[11px] font-black flex flex-col border-2 border-black shadow-sm text-left text-black text-left text-black text-left">
                                                        <span className="text-[8px] text-slate-400 uppercase italic mb-1 text-left text-black text-left text-black text-left">ACCOUNT INFO</span>
                                                        <span className="text-emerald-900 italic leading-tight font-black text-left text-black text-left italic text-black text-left">🏦 {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].account || '미등록'}</span>
                                                    </div>
                                                    {/* 사이트 바로가기 버튼 <a> 태그 유지 */}
                                                    {records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].link && records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].link !== '-' && (
                                                        <a href={records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].link.startsWith('http') ? records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].link : `https://${records[selectedDayKey][Object.keys(records[selectedDayKey])[0]].link}`} target="_blank" rel="noopener noreferrer" className="w-full py-4 bg-emerald-600 text-white rounded-2xl font-black text-xs shadow-md flex items-center justify-center gap-2 active:scale-95 transition-all text-center no-underline text-white text-center">
                                                            <Icon name="Link" className="w-4 h-4 text-white text-center text-white" /> 예약 사이트 바로가기
                                                        </a>
                                                    )}
                                                </div>
                                                <div className="space-y-2 text-left text-black text-left text-black text-left">
                                                    <p className="text-[10px] font-black text-slate-300 uppercase italic px-2 text-black text-left text-black text-left">Crew Status</p>
                                                    <div className="space-y-2 text-black text-left text-black text-left">
                                                        {Object.keys(records[selectedDayKey]).map(n => (
                                                            <div key={n} className="p-4 border-2 border-black rounded-2xl bg-white flex justify-between items-center shadow-md text-left text-black text-left">
                                                                <div className="text-left font-black text-black leading-none text-black text-left text-black text-left">{n}<div className="text-[8px] text-slate-300 font-bold uppercase tracking-tighter text-left mt-1 text-black text-left text-black text-left">{records[selectedDayKey][n].status} • {records[selectedDayKey][n].place}</div></div>
                                                                <div className={`px-4 py-1.5 rounded-full text-[10px] font-black border-2 border-black shadow-[1px_1px_0px_#000] ${records[selectedDayKey][n].paid?'bg-emerald-400 text-white text-center text-black text-center':'bg-white text-slate-300 text-center text-black text-center'}`}>{records[selectedDayKey][n].paid?'입금완료' : '미입금'}</div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        ) : null}
                                        <button onClick={closeModals} className="w-full mt-8 py-5 bg-black text-white rounded-[2rem] font-black text-xl shadow-2xl uppercase tracking-tighter italic text-center text-white text-center text-white text-center">CLOSE</button>
                                    </div>
                                )}

                                {modalType === 'import' && (
                                    <div className="p-10 space-y-6 text-left text-black text-left text-black text-left">
                                        <h3 className="text-2xl font-black text-center italic tracking-tighter uppercase text-center text-black text-center text-black text-center">DATA IMPORT</h3>
                                        <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="카톡에서 복사한 내용을 붙여넣으세요. (기록 자동 반영)" className="w-full h-40 bg-emerald-50 border-4 border-black rounded-3xl p-5 text-sm font-black outline-none shadow-inner italic text-black text-left text-black text-left" />
                                        <div className="flex gap-3 text-center text-black text-center text-black text-center"><button onClick={processImport} className="flex-[2] bg-black text-white py-5 rounded-2xl font-black text-lg shadow-xl italic active:scale-95 text-white text-center text-white text-center">PROCESS</button><button onClick={closeModals} className="flex-1 bg-slate-100 text-slate-400 border-2 border-black rounded-2xl font-black text-sm uppercase text-slate-400 text-center text-slate-400 text-center">CANCEL</button></div>
                                    </div>
                                )}

                                {modalType === 'name' && (
                                    <div className="p-10 space-y-6 text-left text-black text-left text-black text-left">
                                        <h3 className="text-2xl font-black text-center italic uppercase tracking-tighter text-black text-center text-black text-center text-black text-center">Crew Manager</h3>
                                        <div className="space-y-2 max-h-[40vh] overflow-y-auto pr-2 no-scrollbar text-left text-black text-left text-black text-left">{members.map((m,i)=>(<div key={i} className="flex gap-2 text-black text-left text-black text-left text-black text-left"><input type="text" value={m} onChange={e=>{const nl=[...members]; nl[i]=e.target.value; setMembers(nl);}} className="flex-1 bg-slate-50 border-2 border-black rounded-xl px-4 py-3 text-sm font-black italic shadow-inner outline-none focus:border-cyan-500 text-left text-black text-left text-black text-left text-black text-left" /><button onClick={()=>setMembers(members.filter((_,idx)=>idx!==i))} className="text-rose-200 p-2 hover:text-rose-500 text-center text-black text-center text-rose-200 text-center"><Icon name="Trash" className="w-5 h-5 text-rose-200 text-center text-rose-200 text-center" /></button></div>))}<button onClick={()=>setMembers([...members, ''])} className="w-full py-4 border-2 border-dashed border-slate-200 text-slate-300 rounded-2xl font-black text-center text-slate-300 text-center text-slate-300 text-center">+ ADD NEW CREW</button></div>
                                        <div className="flex gap-2 text-center text-black text-center text-black text-center text-black text-center">
                                            <button onClick={async()=>{
                                                const {FBASE_LIB, FBASE_CONFIG}=window; 
                                                const newMembers = members.filter(x=>x.trim());
                                                // HTML 환경 크루 설정 로컬 저장 반영
                                                if(!FBASE_CONFIG.config.apiKey) {
                                                    setMembers(newMembers);
                                                    localStorage.setItem('FL_MEMBERS', JSON.stringify(newMembers));
                                                    return closeModals();
                                                }
                                                const db = FBASE_LIB.getFirestore(); 
                                                await FBASE_LIB.setDoc(FBASE_LIB.doc(db,`/artifacts/${FBASE_CONFIG.id}/public/data/config`,'members'),{list:newMembers}); 
                                                closeModals();
                                            }} className="flex-1 py-5 bg-black text-white rounded-2xl font-black text-lg shadow-xl italic active:scale-95 text-white text-center text-white text-center">SAVE</button>
                                            <button onClick={closeModals} className="flex-1 py-5 bg-slate-100 text-slate-300 rounded-2xl font-black text-sm border-2 border-black active:scale-95 text-slate-400 text-center text-slate-400 text-center">CLOSE</button>
                                        </div>
                                    </div>
                                )}

                                {modalType === 'setup' && (
                                    <div className="p-8 max-h-[85vh] overflow-y-auto no-scrollbar pb-24 text-left text-black text-left text-black text-left text-black text-left">
                                        <h3 className="text-2xl font-black mb-8 text-center italic uppercase tracking-tighter text-black text-center text-black text-center text-black text-center text-black text-center">Fleet Deployment</h3>
                                        <div className="space-y-10 text-black text-left text-black text-left text-black">
                                            <section className="text-left text-black text-left"><p className="text-[10px] font-black text-slate-300 mb-3 italic uppercase text-left text-slate-300 text-left">01. Personnel Selection</p><div className="grid grid-cols-4 gap-2 text-left">{members.map(m=>(<button key={m} onClick={()=>{const is=formData.names.includes(m); setFormData({...formData, names:is?formData.names.filter(x=>x!==m):[...formData.names,m], paidMap:{...formData.paidMap,[m]:false}})}} className={`py-3 px-1 rounded-2xl text-[11px] font-black border-2 transition-all ${formData.names.includes(m)?'bg-orange-400 text-white border-black shadow-[3px_3px_0px_#000] scale-105 text-center':'bg-white text-slate-400 border-slate-100 text-center'}`}>{m}</button>))}</div></section>
                                            <div className="grid grid-cols-2 gap-4 text-left text-black text-left"><section className="text-left text-black text-left"><p className="text-[10px] font-black text-slate-300 mb-3 italic text-center uppercase font-black text-center text-slate-300 text-center">02. Status</p><div className="flex flex-col gap-2 text-left">{['출조','휴무','출조대기'].map(x=>(<button key={x} onClick={()=>setFormData({...formData,status:x})} className={`py-4 rounded-2xl text-xs font-black border-2 border-black shadow-lg ${formData.status===x?'bg-black text-white text-center text-white text-center':'bg-slate-50 text-slate-300 text-center text-slate-400 text-center'}`}>{x}</button>))}</div></section><section className="text-center text-black text-center text-black text-center"><p className="text-[10px] font-black text-slate-300 mb-3 italic text-center uppercase font-black text-center text-slate-300 text-center">03. Type</p><div className="flex flex-col gap-2 text-left">{['선상','워킹','양식장'].map(x=>(<button key={x} onClick={()=>setFormData({...formData,place:x})} className={`py-4 rounded-2xl text-xs font-black border-2 border-black shadow-lg ${formData.place===x?'bg-black text-white text-center text-white text-center':'bg-slate-50 text-slate-300 text-center text-slate-400 text-center'}`}>{x}</button>))}</div></section></div>
                                            <section className="space-y-4 text-left text-black text-left text-black text-left"><p className="text-[10px] font-black text-slate-300 italic uppercase text-left text-slate-300 text-left">04. Intel Input</p>
                                                <div className="flex gap-2 text-left text-black text-left"><select value={formData.species} onChange={e=>setFormData({...formData,species:e.target.value})} className="flex-[1.2] bg-slate-50 border-2 border-black rounded-xl p-4 text-sm font-black outline-none shadow-inner italic text-left text-black text-left text-black"><option value="">TARGET 어종</option>{['우럭','광어','참돔','쭈꾸미','갑오징어','문어','한치','백조기','기타'].map(x=><option key={x} value={x}>{x}</option>)}</select><input type="text" placeholder="FEE (원)" value={formData.fee} onChange={e=>setFormData({...formData,fee:e.target.value})} className="flex-1 bg-slate-50 border-2 border-black rounded-xl p-4 text-sm font-black shadow-inner text-left text-black text-left text-black text-left" /></div>
                                                <input type="text" placeholder="선사 예약 URL" value={formData.link} onChange={e=>setFormData({...formData,link:e.target.value})} className="w-full bg-slate-50 border-2 border-black rounded-xl p-4 text-[10px] font-black shadow-inner text-left text-black text-left text-black text-left" />
                                                <input type="text" placeholder="배 이름 / 선박명" value={formData.ship} onChange={e=>setFormData({...formData,ship:e.target.value})} className="w-full bg-slate-50 border-2 border-black rounded-xl p-4 text-[10px] font-black shadow-inner text-left text-black text-left text-black text-left" />
                                                <input type="text" placeholder="입금 계좌 번호" value={formData.account} onChange={e=>setFormData({...formData,account:e.target.value})} className="w-full bg-slate-50 border-2 border-black rounded-xl p-4 text-[11px] font-black shadow-inner italic text-left text-black text-left text-black text-left" />
                                            </section>
                                            {formData.names.length>0 && <section className="space-y-4 text-left text-black text-black text-left text-black"><p className="text-[10px] font-black text-slate-300 mb-3 italic uppercase text-left text-slate-300 text-left">05. Payment Tracker</p><div className="space-y-2 text-left text-black text-left text-black text-left text-black">
                                              {formData.names.map(n=>(<div key={n} className="flex justify-between items-center p-4 bg-white border-2 border-black rounded-2xl shadow-md text-left text-black text-left text-black text-left text-black"><span className="text-sm font-black italic text-left text-black text-left text-black text-left text-black">{n}</span><div className="flex items-center gap-3 text-left text-black text-left text-black text-left text-black"><span className={`text-[10px] font-black ${formData.paidMap[n]?'text-emerald-500':'text-rose-300'} text-left text-black text-left text-black text-left text-black text-left text-black`}>{formData.paidMap[n]?'PAID':'DUE'}</span><input type="checkbox" checked={formData.paidMap[n]||false} onChange={e=>setFormData({...formData,paidMap:{...formData.paidMap,[n]:e.target.checked}})} className="w-6 h-6 accent-black border-2 border-black rounded-lg text-left text-black text-left text-black text-left text-black text-left text-black" /></div></div>))}
                                            </div></section>}
                                            <div className="flex gap-4 text-center text-black text-center text-black text-center text-black text-center"><button onClick={saveSchedule} className="flex-[2] bg-black text-white py-6 rounded-[2.5rem] font-black text-xl italic shadow-2xl active:scale-95 text-center text-white text-center text-white text-center text-white">EXECUTE SAVE</button><button onClick={closeModals} className="flex-1 bg-slate-100 text-slate-400 border-2 border-black rounded-[2.5rem] font-black text-sm text-center text-slate-400 text-center text-slate-400 text-center text-slate-400">CANCEL</button></div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {alertConfig.show && (
                        <div className="fixed inset-0 z-[2000] bg-black/80 flex items-center justify-center p-10 backdrop-blur-2xl text-center text-black text-center text-black text-center">
                            <div className="bg-white rounded-[3rem] p-10 w-full max-w-[320px] border-4 border-black text-center shadow-2xl animate-in zoom-in-95 duration-500 text-black text-left text-black text-center text-black text-center">
                                <Icon name="Alert" className="w-12 h-12 mx-auto mb-4 text-emerald-500 text-center text-emerald-500 text-center text-emerald-500" strokeWidth={3} />
                                <h4 className="text-xl font-black mb-2 italic uppercase text-center text-black text-center text-black text-center">{alertConfig.title}</h4>
                                <p className="text-xs font-bold text-slate-400 leading-relaxed mb-8 text-center text-slate-400 text-center text-slate-400 text-center">{alertConfig.message}</p>
                                <div className="flex flex-col gap-3 text-center text-black text-center text-black text-center text-black text-center text-black text-center">
                                    {alertConfig.onConfirm ? (<><button onClick={()=>{alertConfig.onConfirm();closeModals();}} className="w-full py-5 bg-black text-white rounded-2xl font-black text-sm shadow-xl italic tracking-widest uppercase text-center text-white text-center text-white text-center text-white">CONFIRM</button><button onClick={closeModals} className="w-full py-2 text-slate-300 font-black text-[10px] uppercase tracking-widest text-center text-slate-400 text-center text-slate-400 text-center text-slate-400">CANCEL</button></>) : (<button onClick={closeModals} className="w-full py-5 bg-black text-white rounded-2xl font-black text-sm shadow-xl italic tracking-widest uppercase text-center text-white text-center text-white text-center text-white">OK</button>)}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
